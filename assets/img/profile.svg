<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="prof-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="face-grad" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#f5c2e7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0.9" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#1e1e2e"/>
  <rect width="400" height="400" fill="url(#prof-grad)" opacity="0.15"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="180" fill="#313244" opacity="0.3"/>
  <circle cx="200" cy="200" r="170" fill="#313244" opacity="0.5" stroke="#89b4fa" stroke-width="2"/>

  <!-- Head -->
  <circle cx="200" cy="140" r="60" fill="url(#face-grad)"/>

  <!-- Hair -->
  <path d="M 140 110 Q 140 70 200 70 Q 260 70 260 110" fill="#f5c2e7" opacity="0.8"/>

  <!-- Eyes -->
  <circle cx="185" cy="135" r="5" fill="#1e1e2e"/>
  <circle cx="215" cy="135" r="5" fill="#1e1e2e"/>

  <!-- Smile -->
  <path d="M 190 150 Q 200 160 210 150" stroke="#1e1e2e" stroke-width="2" fill="none"/>

  <!-- Body/Shoulders -->
  <ellipse cx="200" cy="220" rx="75" ry="70" fill="#89b4fa" opacity="0.2"/>

  <!-- Badge: Junior Dev -->
  <circle cx="320" cy="80" r="35" fill="#94e2d5"/>
  <text x="320" y="85" font-family="Arial, sans-serif" font-size="12" fill="#1e1e2e" text-anchor="middle" font-weight="bold">JR</text>
  <text x="320" y="100" font-family="Arial, sans-serif" font-size="10" fill="#1e1e2e" text-anchor="middle">DEV</text>

  <!-- Text: Jana Novotná -->
  <text x="200" y="310" font-family="Arial, sans-serif" font-size="28" fill="#89b4fa" text-anchor="middle" font-weight="bold">Jana Novotná</text>
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="16" fill="#94e2d5" text-anchor="middle">Junior Web Developer</text>
</svg>